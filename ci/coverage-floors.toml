# Per-crate coverage floors for the jolt-verifier dependency closure
# (specs/test-quality-ci.md). Enforced by ci/coverage_gate.py in
# .github/workflows/coverage.yml.
#
# The in-scope set is computed at CI runtime: the cargo-metadata normal-dep
# closure of [scope].root, union [scope].extras. [floors] must list exactly
# the in-scope crates — the gate fails loudly on drift in either direction.
#
# A crate's coverage is measured cumulatively across its [paths] entries
# (merged at line level), over files under its src/ directory only. Floors
# are static minimums under a manual ratchet: raising them is a deliberate,
# reviewed edit; CI never moves them.
#
# Floors are provisional baseline values (2026-07-23) and are re-pinned at
# post-sweep measured values before this PR merges (target >= 80, documented
# exception otherwise).

[scope]
root = "jolt-verifier"
# Verification-relevant crates that are not normal deps of the root:
# the commitment schemes are dev-deps behind trait abstractions, and the
# tracer defines the execution semantics the verified statement is about.
extras = ["jolt-dory", "jolt-akita", "jolt-hyperkzg", "tracer"]

[paths]
# Feature paths per crate; crates not listed run "default" only.
# NOTE: when the Solinas field stack merges, add "solinas" to jolt-field.
jolt-sumcheck = ["default", "r1cs"]
jolt-claims = ["default", "field-inline"]
jolt-r1cs = ["default", "field-inline"]
# image gates the ELF loader + RV64 decoder; field-inline is additive
jolt-program = ["default", "image,field-inline"]
jolt-riscv = ["default", "field-inline"]
jolt-verifier = [
    "default",
    { features = "prover-fixtures", release = true },
    { features = "prover-fixtures,zk", release = true },
]

[floors]
common = 70
jolt-akita = 71
jolt-blindfold = 93
jolt-claims = 87
jolt-claims-derive = 86
jolt-crypto = 84
jolt-dory = 92
jolt-field = 80
jolt-hyperkzg = 94
jolt-lookup-tables = 93
jolt-openings = 89
jolt-poly = 82
jolt-program = 81
jolt-r1cs = 95
jolt-riscv = 72
jolt-sumcheck = 90
jolt-transcript = 62
jolt-verifier = 29
jolt-verifier-derive = 90
tracer = 65

[soundness]
# 111/113 tamper targets active post-sweep (the two exceptions carry
# documented justifications in the manifest); must not regress.
tamper_active_ratio_min = 0.98

# Per-crate error-variant coverage floors. Report-only until pinned:
# crates absent from this table are printed but not enforced.
[soundness.error_variants]
