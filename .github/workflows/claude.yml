name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only trusted authors (MEMBER/COLLABORATOR/OWNER) can invoke @claude.
    # External users are rejected to prevent prompt injection → code execution.
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR' ||
          github.event.comment.author_association == 'OWNER'
        )
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR' ||
          github.event.comment.author_association == 'OWNER'
        )
      ) ||
      (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        (
          github.event.review.author_association == 'MEMBER' ||
          github.event.review.author_association == 'COLLABORATOR' ||
          github.event.review.author_association == 'OWNER'
        )
      ) ||
      (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        (
          github.event.issue.author_association == 'MEMBER' ||
          github.event.issue.author_association == 'COLLABORATOR' ||
          github.event.issue.author_association == 'OWNER'
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@26ddc358fe3befff50c5ec2f80304c90c763f6f8 # v1
        env:
          CLAUDE_CODE_EFFORT_LEVEL: max
          CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY: "1"
          DISABLE_ERROR_REPORTING: "1"
          DISABLE_FEEDBACK_COMMAND: "1"
          DISABLE_TELEMETRY: "1"
          ENABLE_CLAUDEAI_MCP_SERVERS: "false"
          ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-sonnet-4-6
          ANTHROPIC_DEFAULT_SONNET_MODEL: claude-opus-4-6
          CLAUDE_CODE_SUBAGENT_MODEL: claude-opus-4-6
          TASK_MAX_OUTPUT_LENGTH: "64000"
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: '--model claude-opus-4-6 --allowed-tools "Bash(gh pr:*)" "Bash(gh issue:*)" "Bash(cargo:*)" Read Edit Write Glob Grep Agent'
