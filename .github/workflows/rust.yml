name: Build and Test Jolt

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**", main]

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: cargo clippy --features allocative,host
        run: cargo clippy --all --all-targets --features allocative,host
      - name: cargo clippy --no-default-features
        run: cargo clippy --all --all-targets --no-default-features

  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bnjbvr/cargo-machete@main
      - name: cargo machete
        run: cargo machete --with-metadata

  build-wasm:
    name: Build Wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Build Wasm
        working-directory: ./jolt-core
        run: RUSTFLAGS='--cfg getrandom_backend="wasm_js"' cargo build --release --target wasm32-unknown-unknown

  test-core:
    runs-on: ubuntu-latest
    name: Test jolt-core
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-directories: ~/.cache/dory
      - name: Build and install jolt CLI
        run: cargo install --path . --locked
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run jolt-core tests
        run: cargo nextest run --release -p jolt-core

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: crate-ci/typos@v1.43.5
        with:
          files: .

  test-sdk:
    name: jolt binary check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-directories: ~/.cache/dory
      - name: Build and install jolt CLI
        run: cargo install --path . --locked

      - name: Use the `jolt` binary to generate code
        run: jolt new sample_project

      - name: Pin jolt-sdk to current commit in Cargo.toml files
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          # Pin jolt-sdk in the host Cargo.toml
          sed -i 's|jolt-sdk = { git = "https://github.com/a16z/jolt", features = \["host"\] }|jolt-sdk = { git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'", features = ["host"] }|' sample_project/Cargo.toml
          # Pin jolt-sdk in the guest Cargo.toml
          sed -i 's|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt" }|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'" }|' sample_project/guest/Cargo.toml

      - name: Make sure the generated code runs
        working-directory: ./sample_project
        run: cargo run --release

      - name: Install wasm-pack and wasm32 target
        run: |
          curl https://drager.github.io/wasm-pack/installer/init.sh -sSf | sh
          rustup target add wasm32-unknown-unknown

      - name: Run jolt build-wasm
        working-directory: ./sample_project
        run: jolt build-wasm

  test-wasm-verify:
    name: WASM Verifier E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-directories: ~/.cache/dory
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build and install jolt CLI
        run: cargo install --path . --locked

      - name: Install wasm-pack and wasm32 target
        run: |
          curl https://drager.github.io/wasm-pack/installer/init.sh -sSf | sh
          rustup target add wasm32-unknown-unknown

      - name: Generate sample project
        run: jolt new sample_project

      - name: Pin jolt-sdk to current commit
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          sed -i 's|jolt-sdk = { git = "https://github.com/a16z/jolt", features = \["host"\] }|jolt-sdk = { git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'", features = ["host"] }|' sample_project/Cargo.toml
          sed -i 's|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt" }|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'" }|' sample_project/guest/Cargo.toml

      - name: Write prover that saves artifacts
        run: |
          cat > sample_project/src/main.rs << 'EOF'
          use jolt_sdk::Serializable;
          use tracing::info;

          pub fn main() {
              tracing_subscriber::fmt::init();

              let target_dir = "/tmp/jolt-guest-targets";
              let mut program = guest::compile_fib(target_dir);

              let shared_preprocessing = guest::preprocess_shared_fib(&mut program);
              let prover_preprocessing = guest::preprocess_prover_fib(shared_preprocessing.clone());
              let verifier_setup = prover_preprocessing.generators.to_verifier_setup();
              let verifier_preprocessing =
                  guest::preprocess_verifier_fib(shared_preprocessing, verifier_setup);

              let pp_bytes = verifier_preprocessing.serialize_to_bytes().expect("serialize pp");
              std::fs::write("pp.bin", &pp_bytes).expect("write pp");
              info!("preprocessing: {} bytes", pp_bytes.len());

              let prove_fib = guest::build_prover_fib(program, prover_preprocessing);
              let (output, proof, io_device) = prove_fib(50);
              info!("output: {output}");

              let proof_bytes = proof.serialize_to_bytes().expect("serialize proof");
              std::fs::write("proof.bin", &proof_bytes).expect("write proof");
              info!("proof: {} bytes", proof_bytes.len());

              let io_bytes = io_device.serialize_to_bytes().expect("serialize io");
              std::fs::write("io.bin", &io_bytes).expect("write io");
              info!("io: {} bytes", io_bytes.len());
          }
          EOF

      - name: Prove natively and save artifacts
        working-directory: ./sample_project
        run: cargo run --release

      - name: Build WASM verifier
        working-directory: ./sample_project
        run: jolt build-wasm

      - name: Verify proof in WASM
        working-directory: ./sample_project
        run: |
          cat > verify.mjs << 'EOF'
          import { readFileSync } from 'fs';
          import { initSync, verify_fib } from './pkg/sample_project.js';

          const wasmBytes = readFileSync('./pkg/sample_project_bg.wasm');
          initSync(wasmBytes);

          const pp = new Uint8Array(readFileSync('pp.bin'));
          const proof = new Uint8Array(readFileSync('proof.bin'));
          const io = new Uint8Array(readFileSync('io.bin'));

          console.log(`preprocessing: ${pp.length} bytes`);
          console.log(`proof: ${proof.length} bytes`);
          console.log(`io: ${io.length} bytes`);

          const result = verify_fib(pp, proof, io);
          console.log(`verification result: ${result}`);

          if (!result) {
              console.error('WASM verification failed');
              process.exit(1);
          }
          EOF
          node verify.mjs

  test-inlines:
    name: Test inlines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Discover inline crates
        id: discover_inlines
        shell: bash
        run: |
          set -euo pipefail
          pkgs=$(cargo metadata --format-version=1 --no-deps \
                   | jq -r '.packages[].name' \
                   | grep '^jolt-inlines-' \
                   | tr '\n' ' ')
          echo "Found inline crates: $pkgs"
          echo "pkgs=$pkgs" >> "$GITHUB_OUTPUT"
      - name: Test each inline crate (host)
        shell: bash
        run: |
          set -euo pipefail
          for pkg in ${{ steps.discover_inlines.outputs.pkgs }}; do
            cargo nextest run --features host -p "$pkg"
          done

  test-sdk-verifier:
    name: Jolt SDK Verifier Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-directories: ~/.cache/dory
      - name: Build and install jolt CLI
        run: cargo install --path . --locked
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Generate test fixtures
        run: bash jolt-sdk/tests/gen-fixtures.sh
      - name: Run SDK verifier tests
        run: cargo nextest run --release -p jolt-sdk --features host

  test-tracer:
    runs-on: ubuntu-latest
    name: Test tracer
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build and install jolt CLI
        run: cargo install --path . --locked
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run tracer tests
        run: cargo nextest run --release -p tracer

  zklean-extractor-tests:
    name: ZkLean extractor tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run extractor tests
        working-directory: ./zklean-extractor
        run: cargo test

  compile-extracted-lean:
    name: Compile extracted Lean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract Jolt ZkLean package
        working-directory: ./zklean-extractor
        run: cargo run --release -- -o -p jolt-zklean

