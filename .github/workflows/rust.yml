name: Build and Test Jolt

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**", main]
    paths-ignore:
      - "specs/**"
      - "*.md"
      - ".claude/**"

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

# Caching strategy: jobs with near-identical dependency footprints share one
# rust-cache entry (shared-key), and only the job with the largest footprint
# saves it. Per-job caches previously totaled >10 GB, blowing the repository
# cache quota so every run started cold.
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
          cache: false
      - name: cargo fmt
        run: cargo fmt --all --check

  taplo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - name: taplo fmt --check
        run: taplo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: clippy
      - name: cargo clippy --features allocative,host
        run: cargo clippy --all --all-targets --features allocative,host
      - name: cargo clippy --features allocative,host,zk
        run: cargo clippy --all --all-targets --features allocative,host,zk
      - name: cargo clippy --no-default-features
        run: cargo clippy --all --all-targets --no-default-features
      # jolt-verifier's prover-fixtures feature gates live prover artifact
      # generation for verifier tests. It is not enabled by the workspace-wide
      # invocations above, so build it explicitly in both modes.
      - name: cargo clippy -p jolt-verifier --features prover-fixtures
        run: cargo clippy -p jolt-verifier --all-targets --features prover-fixtures
      - name: cargo clippy -p jolt-verifier --features prover-fixtures,zk
        run: cargo clippy -p jolt-verifier --all-targets --features prover-fixtures,zk
      # The akita feature selects the lattice (Akita) PIOP; it is not enabled
      # by the workspace-wide invocations above.
      - name: cargo clippy -p jolt-verifier --features akita
        run: cargo clippy -p jolt-verifier --all-targets --features akita
      # The akita fixture-driven tamper suite compiles under akita,prover-fixtures
      # (the real packed prover generates its fixtures). Lint it explicitly.
      - name: cargo clippy -p jolt-verifier --features akita,prover-fixtures
        run: cargo clippy -p jolt-verifier --all-targets --features akita,prover-fixtures
      - name: cargo clippy -p jolt-prover-legacy --features akita
        run: cargo clippy -p jolt-prover-legacy --all-targets --features akita
      # The field-inline feature is not enabled by host/zk/default, so the
      # workspace-wide invocations above never build it. Lint the crates that
      # define it explicitly so the feature keeps compiling.
      - name: cargo clippy --features field-inline
        run: >
          cargo clippy
          -q
          --message-format=short
          -p jolt-claims
          -p jolt-r1cs
          -p tracer
          -p jolt-program
          -p jolt-riscv
          -p jolt-lookup-tables
          --all-targets
          --features field-inline
          --
          -D warnings
      - name: cargo clippy -p jolt-prover-legacy -p jolt-sdk --features host,field-inline
        run: >
          cargo clippy
          -q
          --message-format=short
          -p jolt-prover-legacy
          -p jolt-sdk
          --all-targets
          --features host,field-inline
          --
          -D warnings

  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: bnjbvr/cargo-machete@main
      - name: cargo machete
        run: cargo machete --with-metadata

  build-wasm:
    name: Build Wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: wasm
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Build Wasm
        working-directory: ./crates/jolt-prover-legacy
        run: RUSTFLAGS='--cfg getrandom_backend="wasm_js"' cargo build --release --target wasm32-unknown-unknown

  test-prover:
    runs-on: ubuntu-latest
    name: Test jolt-prover-legacy
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-src
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: false
          cache-directories: ~/.cache/dory
      - name: Cache ZeroOS musl toolchain
        id: cache-zeroos-musl
        uses: actions/cache@v6
        with:
          path: ~/.zeroos/musl
          key: zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64
      - name: Install ZeroOS musl toolchain
        if: steps.cache-zeroos-musl.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/LayerZero-Labs/ZeroOS/releases/download/musl-toolchain-musl-1.2.3-gcc-9.4.0/zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64.tar.gz -o /tmp/zeroos-musl.tar.gz
          mkdir -p ~/.zeroos
          tar -xzf /tmp/zeroos-musl.tar.gz -C ~/.zeroos
      # --target-dir target shares dependency artifacts with the test build
      # below (cargo install otherwise compiles everything in a temp dir).
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force --profile ci --target-dir target
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run jolt-prover-legacy tests
        run: cargo nextest run --cargo-profile ci -p jolt-prover-legacy

  test-prover-zk:
    runs-on: ubuntu-latest
    name: Test jolt-prover-legacy (zk)
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-src
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: false
          cache-directories: ~/.cache/dory
      - name: Cache ZeroOS musl toolchain
        id: cache-zeroos-musl
        uses: actions/cache@v6
        with:
          path: ~/.zeroos/musl
          key: zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64
      - name: Install ZeroOS musl toolchain
        if: steps.cache-zeroos-musl.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/LayerZero-Labs/ZeroOS/releases/download/musl-toolchain-musl-1.2.3-gcc-9.4.0/zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64.tar.gz -o /tmp/zeroos-musl.tar.gz
          mkdir -p ~/.zeroos
          tar -xzf /tmp/zeroos-musl.tar.gz -C ~/.zeroos
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force --profile ci --target-dir target
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run jolt-prover-legacy tests with zk feature
        run: cargo nextest run --cargo-profile ci -p jolt-prover-legacy --features zk

  test-prover-akita:
    runs-on: ubuntu-latest
    name: Test jolt-prover-legacy (akita)
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-src
          cache: false
      # Sole saver for the release-tests shared cache — largest dependency
      # footprint of the group (host + akita at release).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          cache-directories: ~/.cache/dory
      - name: Cache ZeroOS musl toolchain
        id: cache-zeroos-musl
        uses: actions/cache@v6
        with:
          path: ~/.zeroos/musl
          key: zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64
      - name: Install ZeroOS musl toolchain
        if: steps.cache-zeroos-musl.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/LayerZero-Labs/ZeroOS/releases/download/musl-toolchain-musl-1.2.3-gcc-9.4.0/zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64.tar.gz -o /tmp/zeroos-musl.tar.gz
          mkdir -p ~/.zeroos
          tar -xzf /tmp/zeroos-musl.tar.gz -C ~/.zeroos
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force --profile ci --target-dir target
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      # The packed-prover e2e suite: muldiv, forced K=256, trusted/untrusted
      # advice, and committed-program, each proving and verifying over the
      # Akita lattice PCS (the release-only perf harness stays ignored).
      - name: Run jolt-prover-legacy tests with akita feature
        run: cargo nextest run --cargo-profile ci -p jolt-prover-legacy --features akita

  test-verifier-akita-fixtures:
    runs-on: ubuntu-latest
    name: Test jolt-verifier (akita fixtures)
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-src
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: false
          cache-directories: ~/.cache/dory
      - name: Cache ZeroOS musl toolchain
        id: cache-zeroos-musl
        uses: actions/cache@v6
        with:
          path: ~/.zeroos/musl
          key: zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64
      - name: Install ZeroOS musl toolchain
        if: steps.cache-zeroos-musl.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/LayerZero-Labs/ZeroOS/releases/download/musl-toolchain-musl-1.2.3-gcc-9.4.0/zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64.tar.gz -o /tmp/zeroos-musl.tar.gz
          mkdir -p ~/.zeroos
          tar -xzf /tmp/zeroos-musl.tar.gz -C ~/.zeroos
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force --profile ci --target-dir target
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      # The fixture-driven akita suites: valid-fixture acceptance
      # (completeness/akita.rs) and the typed clear-claim, commitment-byte,
      # proof-shape, and presence tamper sweeps (tampering/akita.rs), backed
      # by fixtures the real packed prover generates at test time.
      - name: Run jolt-verifier akita fixture and tamper suites
        run: cargo nextest run --cargo-profile ci -p jolt-verifier --features akita,prover-fixtures

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: crate-ci/typos@v1.48.0
        with:
          files: .

  test-sdk:
    name: jolt binary check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: false
          cache-directories: ~/.cache/dory
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force --profile ci --target-dir target

      - name: Use the `jolt` binary to generate code
        run: jolt new sample_project

      - name: Pin jolt-sdk to current commit in Cargo.toml files
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          # Pin jolt-sdk in the host Cargo.toml
          sed -i 's|jolt-sdk = { git = "https://github.com/a16z/jolt", features = \["host"\] }|jolt-sdk = { git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'", features = ["host"] }|' sample_project/Cargo.toml
          # Pin jolt-sdk in the guest Cargo.toml
          sed -i 's|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt" }|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'" }|' sample_project/guest/Cargo.toml

      - name: Make sure the generated code runs
        working-directory: ./sample_project
        run: cargo run --release

      - name: Make sure the generated code runs with field-inline
        working-directory: ./sample_project
        run: cargo run --release -q --message-format=short --features field-inline

  test-wasm-verify:
    name: WASM Verifier E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: false
          cache-directories: ~/.cache/dory
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force --profile ci --target-dir target

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-0.13.1
      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: curl -sSL https://github.com/rustwasm/wasm-pack/releases/download/v0.13.1/wasm-pack-v0.13.1-x86_64-unknown-linux-musl.tar.gz | tar -xz --strip-components=1 -C ~/.cargo/bin
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Generate sample project
        run: jolt new sample_project

      - name: Pin jolt-sdk to current commit
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          sed -i 's|jolt-sdk = { git = "https://github.com/a16z/jolt", features = \["host"\] }|jolt-sdk = { git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'", features = ["host"] }|' sample_project/Cargo.toml
          sed -i 's|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt" }|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'" }|' sample_project/guest/Cargo.toml

      - name: Set up prover and verifier scripts
        run: |
          cp scripts/ci/wasm-e2e/prove_and_save.rs sample_project/src/main.rs
          cp scripts/ci/wasm-e2e/verify.mjs sample_project/verify.mjs

      - name: Prove natively and save artifacts
        working-directory: ./sample_project
        run: cargo run --release

      - name: Build WASM verifier
        working-directory: ./sample_project
        run: jolt build-wasm

      - name: Verify proof in WASM
        working-directory: ./sample_project
        run: node verify.mjs

  # Sharded 3-way: the sequential per-crate loop was the CI critical path
  # (~18 min). Crates are assigned to shards by discovery index; each crate
  # keeps its own nextest invocation so per-crate feature resolution is
  # unchanged.
  test-crates-shard:
    name: Test modular crates (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dev-tests-${{ matrix.shard }}
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Discover modular crates
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          pkgs=$(cargo metadata --format-version=1 --no-deps \
                   | jq -r '.packages[] | select((.manifest_path | startswith("'"$(pwd)"'/crates/")) and .name != "jolt-prover-legacy") | .name' \
                   | tr '\n' ' ')
          echo "Found crates: $pkgs"
          echo "pkgs=$pkgs" >> "$GITHUB_OUTPUT"
      - name: Test each crate
        shell: bash
        run: |
          set -euo pipefail
          i=0
          for pkg in ${{ steps.discover.outputs.pkgs }}; do
            if (( i % 3 == ${{ matrix.shard }} )); then
              features=()
              if cargo metadata --format-version=1 --no-deps \
                   | jq -e --arg pkg "$pkg" '.packages[] | select(.name == $pkg) | .features | has("test-utils")' >/dev/null; then
                features=(--features test-utils)
              fi
              cargo nextest run -p "$pkg" "${features[@]}" --no-tests=pass
            fi
            i=$((i + 1))
          done
      - name: Test lookup table prover ABI
        if: matrix.shard == 1
        run: cargo nextest run -p jolt-lookup-tables --features prover-abi-tests --test prover_lookup_table_abi --cargo-quiet
      - name: Test jolt-verifier with akita feature
        if: matrix.shard == 1
        run: cargo nextest run -p jolt-verifier --features akita --no-tests=pass --cargo-quiet
      - name: Test crates with field-inline
        if: matrix.shard == 1
        shell: bash
        run: |
          set -euo pipefail
          cargo nextest run -p jolt-claims -p jolt-r1cs \
            -p jolt-program -p jolt-riscv -p jolt-lookup-tables \
            --features field-inline --no-tests=pass --cargo-quiet

  # Join gate so the check name "Test modular crates" is stable regardless of
  # shard count.
  test-crates:
    name: Test modular crates
    runs-on: ubuntu-latest
    needs: test-crates-shard
    if: always()
    steps:
      - name: Check shard results
        run: |
          if [ "${{ needs.test-crates-shard.result }}" != "success" ]; then
            echo "Shard result: ${{ needs.test-crates-shard.result }}"
            exit 1
          fi

  test-akita-schedules:
    name: Akita schedule catalog drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: false
          cache-directories: ~/.cache/dory
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      # Regenerates every checked-in schedule through the planner DP and
      # compares token streams — guards the generated catalogs against
      # planner drift. Ignored by default (minutes of DP solves), so it needs
      # its own lane.
      - name: Regenerate schedule catalogs through the planner
        run: cargo nextest run --cargo-profile ci -p jolt-akita --run-ignored all -E 'test(catalogs_match_planner_regeneration)' --cargo-quiet

  test-inlines:
    name: Test inlines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dev-inlines
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Discover inline crates
        id: discover_inlines
        shell: bash
        run: |
          set -euo pipefail
          pkgs=$(cargo metadata --format-version=1 --no-deps \
                   | jq -r '.packages[].name' \
                   | grep '^jolt-inlines-' \
                   | tr '\n' ' ')
          echo "Found inline crates: $pkgs"
          echo "pkgs=$pkgs" >> "$GITHUB_OUTPUT"
      - name: Test each inline crate (host)
        shell: bash
        run: |
          set -euo pipefail
          for pkg in ${{ steps.discover_inlines.outputs.pkgs }}; do
            cargo nextest run --features host -p "$pkg" --no-tests=pass
          done

  test-sdk-verifier:
    name: Jolt SDK Verifier Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: false
          cache-directories: ~/.cache/dory
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force --profile ci --target-dir target
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Generate test fixtures
        run: bash jolt-sdk/tests/gen-fixtures.sh
      - name: Run SDK verifier tests
        run: cargo nextest run --cargo-profile ci -p jolt-sdk --features host

  test-tracer:
    runs-on: ubuntu-latest
    name: Test tracer
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: false
          cache-directories: ~/.cache/dory
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force --profile ci --target-dir target
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run tracer tests
        run: cargo nextest run --cargo-profile ci -p tracer --features test-utils --cargo-quiet
      - name: Run tracer tests with field-inline
        run: cargo nextest run --cargo-profile ci -p tracer --features test-utils,field-inline --cargo-quiet

  zklean-extractor-tests:
    name: ZkLean extractor tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Run extractor tests
        working-directory: ./zklean-extractor
        run: cargo test

  compile-extracted-lean:
    name: Compile extracted Lean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Extract Jolt ZkLean package
        working-directory: ./zklean-extractor
        run: cargo run --release -- -o -p jolt-zklean

  #    - name: Run lake build on the extracted model
  #      uses: leanprover/lean-action@v1
  #      with:
  #        lake-package-directory: ./zklean-extractor/jolt-zklean
  #        build: true
  #        test: true
