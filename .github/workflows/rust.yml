name: Build and Test Jolt

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**", main]
    paths-ignore:
      - "specs/**"
      - "*.md"
      - ".claude/**"

env:
  RUSTFLAGS: -D warnings
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: cargo fmt
        run: cargo fmt --all --check

  taplo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - name: taplo fmt --check
        run: taplo fmt --check

  field-stack:
    name: Shared field feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Require one jolt-field identity (bootstrap akita-field pin allowed)
        run: scripts/check-shared-field-identity.sh
      - name: Check no backend
        run: cargo check -p jolt-field --no-default-features
      - name: Check BN254 backend
        run: cargo check -p jolt-field --no-default-features --features bn254
      - name: Test Solinas backend
        run: cargo nextest run -p jolt-field --no-default-features --features solinas --cargo-quiet
      - name: Check combined backends
        run: cargo check -p jolt-field --no-default-features --features bn254,solinas

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: cargo clippy --features allocative,host
        run: cargo clippy --all --all-targets --features allocative,host
      - name: cargo clippy --features allocative,host,zk
        run: cargo clippy --all --all-targets --features allocative,host,zk
      - name: cargo clippy --no-default-features
        run: cargo clippy --all --all-targets --no-default-features
      # jolt-verifier's prover-fixtures feature gates live prover artifact
      # generation for verifier tests. It is not enabled by the workspace-wide
      # invocations above, so build it explicitly in both modes.
      - name: cargo clippy -p jolt-verifier --features prover-fixtures
        run: cargo clippy -p jolt-verifier --all-targets --features prover-fixtures
      - name: cargo clippy -p jolt-verifier --features prover-fixtures,zk
        run: cargo clippy -p jolt-verifier --all-targets --features prover-fixtures,zk
      # The field-inline feature is not enabled by host/zk/default, so the
      # workspace-wide invocations above never build it. Lint the crates that
      # define it explicitly so the feature keeps compiling.
      - name: cargo clippy --features field-inline
        run: >
          cargo clippy
          -q
          --message-format=short
          -p jolt-claims
          -p jolt-r1cs
          -p tracer
          -p jolt-program
          -p jolt-riscv
          -p jolt-lookup-tables
          --all-targets
          --features field-inline
          --
          -D warnings
      - name: cargo clippy -p jolt-prover-legacy -p jolt-sdk --features host,field-inline
        run: >
          cargo clippy
          -q
          --message-format=short
          -p jolt-prover-legacy
          -p jolt-sdk
          --all-targets
          --features host,field-inline
          --
          -D warnings

  machete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: bnjbvr/cargo-machete@main
      - name: cargo machete
        run: cargo machete --with-metadata

  build-wasm:
    name: Build Wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install wasm32 target
        run: rustup target add wasm32-unknown-unknown
      - name: Build Wasm
        working-directory: ./crates/jolt-prover-legacy
        run: RUSTFLAGS='--cfg getrandom_backend="wasm_js"' cargo build --release --target wasm32-unknown-unknown

  test-prover:
    runs-on: ubuntu-latest
    name: Test jolt-prover-legacy
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-src
          cache-directories: ~/.cache/dory
      - name: Cache ZeroOS musl toolchain
        id: cache-zeroos-musl
        uses: actions/cache@v6
        with:
          path: ~/.zeroos/musl
          key: zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64
      - name: Install ZeroOS musl toolchain
        if: steps.cache-zeroos-musl.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/LayerZero-Labs/ZeroOS/releases/download/musl-toolchain-musl-1.2.3-gcc-9.4.0/zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64.tar.gz -o /tmp/zeroos-musl.tar.gz
          mkdir -p ~/.zeroos
          tar -xzf /tmp/zeroos-musl.tar.gz -C ~/.zeroos
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run jolt-prover-legacy tests
        run: cargo nextest run --release -p jolt-prover-legacy

  test-prover-zk:
    runs-on: ubuntu-latest
    name: Test jolt-prover-legacy (zk)
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rust-src
          cache-directories: ~/.cache/dory
      - name: Cache ZeroOS musl toolchain
        id: cache-zeroos-musl
        uses: actions/cache@v6
        with:
          path: ~/.zeroos/musl
          key: zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64
      - name: Install ZeroOS musl toolchain
        if: steps.cache-zeroos-musl.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://github.com/LayerZero-Labs/ZeroOS/releases/download/musl-toolchain-musl-1.2.3-gcc-9.4.0/zeroos-musl-toolchain-musl-1.2.3-gcc-9.4.0-Linux-x86_64.tar.gz -o /tmp/zeroos-musl.tar.gz
          mkdir -p ~/.zeroos
          tar -xzf /tmp/zeroos-musl.tar.gz -C ~/.zeroos
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run jolt-prover-legacy tests with zk feature
        run: cargo nextest run --release -p jolt-prover-legacy --features zk

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@v1.48.0
        with:
          files: .

  test-sdk:
    name: jolt binary check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-directories: ~/.cache/dory
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force

      - name: Use the `jolt` binary to generate code
        run: jolt new sample_project

      - name: Pin jolt-sdk to current commit in Cargo.toml files
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          # Pin jolt-sdk in the host Cargo.toml
          sed -i 's|jolt-sdk = { git = "https://github.com/a16z/jolt", features = \["host"\] }|jolt-sdk = { git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'", features = ["host"] }|' sample_project/Cargo.toml
          # Pin jolt-sdk in the guest Cargo.toml
          sed -i 's|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt" }|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'" }|' sample_project/guest/Cargo.toml

      - name: Make sure the generated code runs
        working-directory: ./sample_project
        run: cargo run --release

      - name: Make sure the generated code runs with field-inline
        working-directory: ./sample_project
        run: cargo run --release -q --message-format=short --features field-inline

  test-wasm-verify:
    name: WASM Verifier E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-directories: ~/.cache/dory
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force

      - name: Cache wasm-pack
        id: cache-wasm-pack
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/wasm-pack
          key: wasm-pack-0.13.1
      - name: Install wasm-pack
        if: steps.cache-wasm-pack.outputs.cache-hit != 'true'
        run: curl -sSL https://github.com/rustwasm/wasm-pack/releases/download/v0.13.1/wasm-pack-v0.13.1-x86_64-unknown-linux-musl.tar.gz | tar -xz --strip-components=1 -C ~/.cargo/bin
      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Generate sample project
        run: jolt new sample_project

      - name: Pin jolt-sdk to current commit
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          sed -i 's|jolt-sdk = { git = "https://github.com/a16z/jolt", features = \["host"\] }|jolt-sdk = { git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'", features = ["host"] }|' sample_project/Cargo.toml
          sed -i 's|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt" }|jolt = { package = "jolt-sdk", git = "https://github.com/a16z/jolt", rev = "'$COMMIT_HASH'" }|' sample_project/guest/Cargo.toml

      - name: Set up prover and verifier scripts
        run: |
          cp scripts/ci/wasm-e2e/prove_and_save.rs sample_project/src/main.rs
          cp scripts/ci/wasm-e2e/verify.mjs sample_project/verify.mjs

      - name: Prove natively and save artifacts
        working-directory: ./sample_project
        run: cargo run --release

      - name: Build WASM verifier
        working-directory: ./sample_project
        run: jolt build-wasm

      - name: Verify proof in WASM
        working-directory: ./sample_project
        run: node verify.mjs

  test-crates:
    name: Test modular crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Discover modular crates
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          pkgs=$(cargo metadata --format-version=1 --no-deps \
                   | jq -r '.packages[] | select((.manifest_path | startswith("'"$(pwd)"'/crates/")) and .name != "jolt-prover-legacy") | .name' \
                   | tr '\n' ' ')
          echo "Found crates: $pkgs"
          echo "pkgs=$pkgs" >> "$GITHUB_OUTPUT"
      - name: Test each crate
        shell: bash
        run: |
          set -euo pipefail
          for pkg in ${{ steps.discover.outputs.pkgs }}; do
            features=()
            if cargo metadata --format-version=1 --no-deps \
                 | jq -e --arg pkg "$pkg" '.packages[] | select(.name == $pkg) | .features | has("test-utils")' >/dev/null; then
              features=(--features test-utils)
            fi
            cargo nextest run -p "$pkg" "${features[@]}" --no-tests=pass
          done
      - name: Test lookup table prover ABI
        run: cargo nextest run -p jolt-lookup-tables --features prover-abi-tests --test prover_lookup_table_abi --cargo-quiet
      - name: Test crates with field-inline
        shell: bash
        run: |
          set -euo pipefail
          cargo nextest run -p jolt-claims -p jolt-r1cs \
            -p jolt-program -p jolt-riscv -p jolt-lookup-tables \
            --features field-inline --no-tests=pass --cargo-quiet

  test-inlines:
    name: Test inlines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Discover inline crates
        id: discover_inlines
        shell: bash
        run: |
          set -euo pipefail
          pkgs=$(cargo metadata --format-version=1 --no-deps \
                   | jq -r '.packages[].name' \
                   | grep '^jolt-inlines-' \
                   | tr '\n' ' ')
          echo "Found inline crates: $pkgs"
          echo "pkgs=$pkgs" >> "$GITHUB_OUTPUT"
      - name: Test each inline crate (host)
        shell: bash
        run: |
          set -euo pipefail
          for pkg in ${{ steps.discover_inlines.outputs.pkgs }}; do
            cargo nextest run --features host -p "$pkg" --no-tests=pass
          done

  test-sdk-verifier:
    name: Jolt SDK Verifier Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-directories: ~/.cache/dory
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Generate test fixtures
        run: bash jolt-sdk/tests/gen-fixtures.sh
      - name: Run SDK verifier tests
        run: cargo nextest run --release -p jolt-sdk --features host

  test-tracer:
    runs-on: ubuntu-latest
    name: Test tracer
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Build and install jolt CLI
        run: cargo install --path . --locked --force
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - name: Run tracer tests
        run: cargo nextest run --release -p tracer --features test-utils --cargo-quiet
      - name: Run tracer tests with field-inline
        run: cargo nextest run --release -p tracer --features test-utils,field-inline --cargo-quiet

  zklean-extractor-tests:
    name: ZkLean extractor tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run extractor tests
        working-directory: ./zklean-extractor
        run: cargo test

  compile-extracted-lean:
    name: Compile extracted Lean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Extract Jolt ZkLean package
        working-directory: ./zklean-extractor
        run: cargo run --release -- -o -p jolt-zklean

