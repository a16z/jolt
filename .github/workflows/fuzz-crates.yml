name: Fuzz crates

on:
  push:
    branches: [main]
    paths:
      - "crates/jolt-crypto/**"
      - "crates/jolt-field/**"
      - "crates/jolt-poly/**"
      - "crates/jolt-sumcheck/**"
      - "crates/jolt-transcript/**"
      - ".github/workflows/fuzz-crates.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/jolt-crypto/**"
      - "crates/jolt-field/**"
      - "crates/jolt-poly/**"
      - "crates/jolt-sumcheck/**"
      - "crates/jolt-transcript/**"
      - ".github/workflows/fuzz-crates.yml"

env:
  CARGO_TERM_COLOR: always
  FUZZ_DURATION: 60

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - jolt-crypto
          - jolt-field
          - jolt-poly
          - jolt-sumcheck
          - jolt-transcript
    name: Fuzz ${{ matrix.crate }}
    concurrency:
      group: fuzz-crates-${{ github.head_ref || github.ref }}-${{ matrix.crate }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Fuzz all targets
        working-directory: crates/${{ matrix.crate }}
        run: |
          set -euo pipefail
          targets=$(cargo +nightly fuzz list)
          if [ -z "$targets" ]; then
            echo "No fuzz targets found for ${{ matrix.crate }}"
            exit 1
          fi
          for target in $targets; do
            echo "--- Fuzzing $target for ${FUZZ_DURATION}s ---"
            cargo +nightly fuzz run --target x86_64-unknown-linux-gnu "$target" -- -max_total_time=$FUZZ_DURATION
          done
