rules:
  - id: jolt-verifier-no-vague-test-taxonomy
    languages: [generic]
    severity: ERROR
    message: "Use precise test language such as baseline, consumer, fixture, or lightweight in jolt-verifier docs/tests."
    paths:
      include:
        - /crates/jolt-verifier/**
        - /specs/jolt-verifier-model-crate.md
    pattern-regex: '(?i)\bsm[o]ke\b'

  - id: jolt-verifier-no-compat-outside-compat
    languages: [rust]
    severity: ERROR
    message: "Compatibility code must stay under crates/jolt-verifier/src/compat."
    paths:
      include:
        - /crates/jolt-verifier/src/**/*.rs
      exclude:
        - /crates/jolt-verifier/src/compat/**
    pattern-regex: '\b(crate::compat|super::compat|compat::)'

  - id: jolt-verifier-no-legacy-outside-compat
    languages: [rust]
    severity: ERROR
    message: "Legacy/core-compat concepts must not leak outside crates/jolt-verifier/src/compat."
    paths:
      include:
        - /crates/jolt-verifier/src/**/*.rs
      exclude:
        - /crates/jolt-verifier/src/compat/**
    pattern-regex: '\b(jolt-core-compat|Legacy[A-Za-z0-9_]*|legacy::|jolt_core::)\b'

  - id: jolt-verifier-stage-inputs-no-opening-id-routers
    languages: [rust]
    severity: ERROR
    message: "Stage input modules should expose typed fields/deps, not JoltOpeningId router logic."
    paths:
      include:
        - /crates/jolt-verifier/src/stages/**/inputs.rs
    pattern-regex: '\bJoltOpeningId\b'

  - id: jolt-verifier-stage-mechanics-stay-in-verify
    languages: [rust]
    severity: ERROR
    message: "Sumcheck calls, formula evaluation, and transcript appends should stay visible in stage verify.rs."
    paths:
      include:
        - /crates/jolt-verifier/src/stages/**/*.rs
      exclude:
        - /crates/jolt-verifier/src/stages/**/verify*.rs
    pattern-regex: '\b(SumcheckVerifier::verify|BatchedSumcheckVerifier::verify|try_evaluate\(|append_labeled\()'

  - id: jolt-verifier-zk-modules-use-statements-not-claims
    languages: [rust]
    severity: ERROR
    message: "Committed stage helpers must use SumcheckStatement/consistency APIs, not construct scalar SumcheckClaim values."
    paths:
      include:
        - /crates/jolt-verifier/src/stages/zk/committed.rs
    pattern-regex: '\bSumcheckClaim::new\b'

  - id: jolt-verifier-zk-modules-no-clear-claims
    languages: [rust]
    severity: ERROR
    message: "Committed stage helpers must not read clear scalar claims."
    paths:
      include:
        - /crates/jolt-verifier/src/stages/zk/committed.rs
    pattern-regex: '\bclear_claims\s*\('

  - id: jolt-verifier-zk-branches-use-statements-not-claims
    languages: [rust]
    severity: ERROR
    message: "ZK stage branches must use SumcheckStatement/consistency APIs, not scalar SumcheckClaim values."
    paths:
      include:
        - /crates/jolt-verifier/src/stages/**/verify*.rs
    pattern: |
      if $CHECKED.zk {
        ...
        SumcheckClaim::new(...)
        ...
      }

  - id: jolt-verifier-zk-branches-no-clear-claims
    languages: [rust]
    severity: ERROR
    message: "ZK stage branches must not read clear scalar claims."
    paths:
      include:
        - /crates/jolt-verifier/src/stages/**/verify*.rs
    pattern: |
      if $CHECKED.zk {
        ...
        $PROOF.clear_claims()
        ...
      }

  - id: jolt-verifier-no-transparent-mode-terminology
    languages: [generic]
    severity: ERROR
    message: "Use clear/non-ZK terminology instead of transparent in jolt-verifier code and spec."
    paths:
      include:
        - /crates/jolt-verifier/**
        - /specs/jolt-verifier-model-crate.md
    pattern-regex: '(?i)\btransparent\b'

  - id: jolt-sumcheck-no-shape-terminology
    languages: [rust]
    severity: ERROR
    message: "Use SumcheckStatement terminology instead of SumcheckShape."
    paths:
      include:
        - /crates/jolt-sumcheck/**
        - /crates/jolt-blindfold/**
        - /crates/jolt-verifier/**
    pattern-regex: '\bSumcheckShape\b'

  - id: jolt-sumcheck-no-committed-check-terminology
    languages: [rust]
    severity: ERROR
    message: "Use committed consistency terminology instead of committed check terminology."
    paths:
      include:
        - /crates/jolt-sumcheck/**
        - /crates/jolt-blindfold/**
        - /crates/jolt-verifier/**
    pattern-regex: '\b(CommittedSumcheckCheck|BatchedCommittedSumcheckCheck|verify_committed\s*\()'

  - id: jolt-claims-no-vm-public-io-computation
    languages: [rust]
    severity: ERROR
    message: "jolt-claims should declare formulas; public IO/address materialization belongs to jolt-program/common plus jolt-poly."
    paths:
      include:
        - /crates/jolt-claims/src/**/*.rs
    pattern-regex: '\b(JoltDevice|MemoryLayout|public_io_mle|output_check_public_values|raf_evaluation_public_values|unmap_ram_address|sparse_mle_msb|range_mask_mle_msb|try_eq_mle)\b'

  - id: jolt-claims-no-spartan-product-computation
    languages: [rust]
    severity: ERROR
    message: "jolt-claims may name Spartan product public values, but product public-value computation belongs to the verifier via jolt-poly helpers."
    paths:
      include:
        - /crates/jolt-claims/src/**/*.rs
    pattern-regex: '\b(product_lagrange_weights|product_public_values|SpartanProductPublicValueError)\b'
