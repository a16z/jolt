[package]
name = "jolt-sumcheck"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Sumcheck protocol types and verification for the Jolt zkVM"

[features]
r1cs = ["dep:jolt-r1cs"]

[lints]
workspace = true

[dependencies]
ark-serialize.workspace = true
jolt-crypto.workspace = true
jolt-field.workspace = true
jolt-openings.workspace = true
jolt-poly.workspace = true
jolt-r1cs = { workspace = true, optional = true }
jolt-transcript.workspace = true
serde = { workspace = true, features = ["derive"] }
tracing.workspace = true
thiserror.workspace = true

[dev-dependencies]
rand.workspace = true
