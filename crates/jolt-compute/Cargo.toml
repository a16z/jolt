[package]
name = "jolt-compute"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Backend-agnostic compute device abstraction for the Jolt zkVM"

[lints]
workspace = true

[dependencies]
jolt-field = { path = "../jolt-field", default-features = false }
jolt-compiler = { path = "../jolt-compiler" }

[dev-dependencies]
jolt-field = { path = "../jolt-field", features = ["bn254"] }
jolt-cpu = { path = "../jolt-cpu" }
jolt-poly = { path = "../jolt-poly" }
rand = { workspace = true }
rand_core = { workspace = true }
rand_chacha = { workspace = true }
num-traits = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "primitives"
harness = false
