[package]
name = "jolt-r1cs"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "R1CS constraint data structures for the Jolt proving system"

[lints]
workspace = true

[dependencies]
jolt-claims.workspace = true
jolt-field = { path = "../jolt-field" }
jolt-poly = { path = "../jolt-poly", features = ["r1cs"] }
num-bigint.workspace = true
num-traits.workspace = true
rayon = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
jolt-field = { path = "../jolt-field", features = ["bn254"] }
jolt-sumcheck = { workspace = true, features = ["r1cs"] }
jolt-transcript = { workspace = true, features = ["poseidon-r1cs"] }
jolt-wrapper.workspace = true
rand_chacha = { workspace = true }
rand_core = { workspace = true }

[features]
default = ["parallel"]
field-inline = ["jolt-claims/field-inline"]
parallel = ["rayon", "jolt-poly/parallel"]
