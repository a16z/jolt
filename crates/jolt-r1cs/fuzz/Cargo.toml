[workspace]

[patch.crates-io]
ark-bn254 = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ec = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ff = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-serialize = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }

[package]
name = "jolt-r1cs-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[package.metadata.jolt-fuzz.targets.claim_lowering_equivalence]
focus = "soundness"
pr-seconds = 30
daily-seconds = 1200
weekly-seconds = 3600

[dependencies]
libfuzzer-sys = "0.4"
jolt-claims = { path = "../../jolt-claims" }
jolt-field = { path = "../../jolt-field", features = ["bn254"] }
jolt-r1cs = { path = "..", default-features = false }

[[bin]]
name = "claim_lowering_equivalence"
path = "fuzz_targets/claim_lowering_equivalence.rs"
test = false
doc = false
bench = false
