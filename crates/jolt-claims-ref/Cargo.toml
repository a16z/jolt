[package]
name = "jolt-claims-ref"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Frozen reference snapshot of the first lattice/Akita jolt-claims integration; not depended on by any crate"

[lints]
workspace = true

[features]
default = []
field-inline = []

[dependencies]
blake2.workspace = true
derive_more.workspace = true
jolt-field.workspace = true
jolt-lookup-tables.workspace = true
jolt-poly.workspace = true
jolt-riscv = { workspace = true, features = ["serialization"] }
serde = { workspace = true, features = ["alloc", "derive"] }
thiserror.workspace = true
