[package]
name = "jolt-transcript"
version = "0.1.0"
edition = "2021"
description = "Fiat-Shamir transcript implementations for Jolt"
repository = "https://github.com/a16z/jolt"
license = "MIT OR Apache-2.0"
keywords = ["SNARK", "cryptography", "proofs", "fiat-shamir"]
categories = ["cryptography", "no-std"]

[lints]
workspace = true

[dependencies]
blake2.workspace = true
digest.workspace = true
sha3.workspace = true
ark-bn254 = { workspace = true, optional = true }
ark-ff = { workspace = true, optional = true }
ark-serialize = { workspace = true, optional = true }
light-poseidon = { workspace = true, optional = true }
jolt-field = { path = "../jolt-field", default-features = false }
jolt-r1cs = { path = "../jolt-r1cs", optional = true }

[features]
default = ["poseidon"]
poseidon = [
  "dep:ark-bn254",
  "dep:ark-ff",
  "dep:ark-serialize",
  "dep:light-poseidon",
  "jolt-field/bn254",
]
r1cs = ["dep:jolt-r1cs"]
poseidon-r1cs = ["poseidon", "r1cs"]

[dev-dependencies]
jolt-field = { path = "../jolt-field", features = ["bn254"] }
num-traits = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "transcript_ops"
harness = false
