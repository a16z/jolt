[package]
name = "jolt-transcript"
version = "0.1.0"
edition = "2021"
description = "Fiat-Shamir transcript implementations for Jolt"
repository = "https://github.com/a16z/jolt"
license = "MIT OR Apache-2.0"
keywords = ["SNARK", "cryptography", "proofs", "fiat-shamir"]
categories = ["cryptography", "no-std"]

[lints]
workspace = true

[features]
default = ["transcript-blake2b", "transcript-keccak", "transcript-poseidon"]
transcript-blake2b = ["spongefish/blake2"]
transcript-keccak = ["spongefish/keccak"]
transcript-poseidon = ["dep:light-poseidon"]

[dependencies]
ark-bn254.workspace = true
ark-ff.workspace = true
light-poseidon = { workspace = true, optional = true }
spongefish = { workspace = true }
jolt-field.workspace = true
rand.workspace = true

[dev-dependencies]
num-traits = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "transcript_ops"
harness = false
