[workspace]

# The fuzz sub-workspace does not inherit the root workspace's `[patch.crates-io]`.
# `light-poseidon` pulls unpatched `ark-ff` from crates.io; jolt-transcript's types
# are built against the patched fork. Apply the same patches here so both sides
# see the same `ark-ff`.
[patch.crates-io]
ark-bn254 = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ec = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ff = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-serialize = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }

[package]
name = "jolt-transcript-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[package.metadata.jolt-fuzz.targets.transcript_determinism]
focus = "soundness"
pr-seconds = 15
daily-seconds = 300
weekly-seconds = 900

[package.metadata.jolt-fuzz.targets.encoding_injectivity]
focus = "soundness"
pr-seconds = 15
daily-seconds = 300
weekly-seconds = 900

[dependencies]
libfuzzer-sys = "0.4"
jolt-transcript = { path = ".." }

[[bin]]
name = "transcript_determinism"
path = "fuzz_targets/transcript_determinism.rs"
test = false
doc = false
bench = false

[[bin]]
name = "encoding_injectivity"
path = "fuzz_targets/encoding_injectivity.rs"
test = false
doc = false
bench = false
