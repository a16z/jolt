[package]
name = "jolt-blindfold"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Generic BlindFold verifier infrastructure for the Jolt zkVM"

[lints]
workspace = true

[dependencies]
ark-serialize.workspace = true
jolt-claims.workspace = true
jolt-crypto.workspace = true
jolt-field.workspace = true
jolt-poly.workspace = true
jolt-r1cs.workspace = true
jolt-sumcheck = { workspace = true, features = ["r1cs"] }
jolt-transcript.workspace = true
rand_core.workspace = true
rayon.workspace = true
serde = { workspace = true, features = ["derive"] }
thiserror.workspace = true

[dev-dependencies]
jolt-field = { workspace = true, features = ["bn254"] }
rand_chacha.workspace = true
rand_core.workspace = true
