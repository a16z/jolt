[package]
name = "jolt-hybrid"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Hybrid GPU/CPU compute backend combinator for the Jolt zkVM"

[lints]
workspace = true

[dependencies]
jolt-compiler = { path = "../jolt-compiler" }
jolt-compute = { path = "../jolt-compute", default-features = false }
jolt-field = { path = "../jolt-field", default-features = false }

[dev-dependencies]
jolt-field = { path = "../jolt-field", features = ["bn254"] }
jolt-compiler = { path = "../jolt-compiler" }
num-traits = { workspace = true }
