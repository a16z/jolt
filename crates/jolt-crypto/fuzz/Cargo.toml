[workspace]

# The fuzz sub-workspace does not inherit the root workspace's `[patch.crates-io]`.
# `light-poseidon` (via jolt-transcript) pulls unpatched `ark-ff` from crates.io;
# jolt-crypto's types are built against the patched fork. Apply the same patches
# here so both sides see the same `ark-ff`.
[patch.crates-io]
ark-bn254 = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ec = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ff = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-serialize = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }

[package]
name = "jolt-crypto-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[package.metadata.jolt-fuzz.targets.deser_group]
focus = "defensive"
pr-seconds = 15
daily-seconds = 300
weekly-seconds = 900

# glv_differential and batch_addition_differential replace group_arith,
# which exercised only arkworks pass-throughs.
[package.metadata.jolt-fuzz.targets.glv_differential]
focus = "correctness"
pr-seconds = 30
daily-seconds = 600
weekly-seconds = 1500

[package.metadata.jolt-fuzz.targets.batch_addition_differential]
focus = "correctness"
pr-seconds = 30
daily-seconds = 600
weekly-seconds = 1500

[package.metadata.jolt-fuzz.targets.pedersen_commit]
focus = "correctness"
pr-seconds = 60
daily-seconds = 1500
weekly-seconds = 2700

[dependencies]
libfuzzer-sys = "0.4"
jolt-crypto = { path = ".." }
jolt-field = { path = "../../jolt-field" }
serde_json = "1"
bincode = { version = "2", features = ["serde"] }
rand_chacha = "0.3"
rand_core = "0.6"

[[bin]]
name = "deser_group"
path = "fuzz_targets/deser_group.rs"
test = false
doc = false
bench = false

[[bin]]
name = "glv_differential"
path = "fuzz_targets/glv_differential.rs"
test = false
doc = false
bench = false

[[bin]]
name = "batch_addition_differential"
path = "fuzz_targets/batch_addition_differential.rs"
test = false
doc = false
bench = false

[[bin]]
name = "pedersen_commit"
path = "fuzz_targets/pedersen_commit.rs"
test = false
doc = false
bench = false
