[package]
name = "jolt-spartan"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Spartan R1CS prover and verifier for the Jolt zkVM"

[lints]
workspace = true

[features]
default = ["parallel"]
parallel = ["rayon"]

[dependencies]
jolt-field = { path = "../jolt-field" }
jolt-poly = { path = "../jolt-poly" }
jolt-transcript = { path = "../jolt-transcript" }
jolt-sumcheck = { path = "../jolt-sumcheck" }
jolt-ir = { path = "../jolt-ir" }
jolt-openings = { path = "../jolt-openings" }
num-traits = { workspace = true }
rayon = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

[dev-dependencies]
rand = { workspace = true }
rand_chacha = { workspace = true }
rand_core = { workspace = true }
criterion = { workspace = true }
num-traits = { workspace = true }
jolt-openings = { path = "../jolt-openings", features = ["test-utils"] }
jolt-crypto = { path = "../jolt-crypto" }
jolt-hyperkzg = { path = "../jolt-hyperkzg" }

[[bench]]
name = "spartan"
harness = false

[package.metadata.cargo-machete]
ignored = ["rand", "rand_chacha", "jolt-crypto", "jolt-hyperkzg"]
