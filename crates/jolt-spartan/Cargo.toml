[package]
name = "jolt-spartan"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Spartan R1CS prover and verifier for the Jolt zkVM"

[lints]
workspace = true

[dependencies]
jolt-field = { path = "../jolt-field" }
jolt-poly = { path = "../jolt-poly" }
jolt-transcript = { path = "../jolt-transcript" }
jolt-sumcheck = { path = "../jolt-sumcheck" }
jolt-openings = { path = "../jolt-openings" }
num-traits = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

[dev-dependencies]
ark-bn254 = { workspace = true, features = ["scalar_field"] }
rand = { workspace = true }
rand_chacha = { workspace = true }
jolt-openings = { path = "../jolt-openings", features = ["test-utils"] }

[package.metadata.cargo-machete]
ignored = ["rand", "rand_chacha"]
