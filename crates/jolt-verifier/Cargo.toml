[package]
name = "jolt-verifier"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Standalone verifier model crate for Jolt proofs"
repository = "https://github.com/a16z/jolt"
keywords = ["SNARK", "zkvm", "verifier"]
categories = ["cryptography"]

[lints]
workspace = true

[features]
default = ["transcript-blake2b"]
prover-fixtures = ["jolt-prover-legacy/host"]
field-inline = ["jolt-claims/field-inline", "jolt-r1cs/field-inline"]
zk = ["jolt-prover-legacy/zk"]
# The packed (lattice/Akita) commitment mode: one packed one-hot witness per
# commitment object, co-batched reduction opening. Mutually exclusive with
# `zk` — one PIOP per compiled verifier.
akita = []
packed = ["jolt-claims/packed"]
transcript-blake2b = []
transcript-keccak = []
transcript-poseidon = []

[dependencies]
ark-serialize.workspace = true
common.workspace = true
jolt-blindfold.workspace = true
jolt-claims.workspace = true
jolt-claims-derive.workspace = true
jolt-crypto.workspace = true
jolt-field.workspace = true
jolt-lookup-tables.workspace = true
jolt-openings.workspace = true
jolt-poly.workspace = true
jolt-program = { workspace = true, features = ["serialization"] }
jolt-r1cs.workspace = true
jolt-riscv = { workspace = true, features = ["serialization"] }
jolt-sumcheck.workspace = true
jolt-transcript.workspace = true
jolt-verifier-derive.workspace = true
num-traits.workspace = true
serde.workspace = true
thiserror.workspace = true

[dev-dependencies]
bincode.workspace = true
jolt-prover-legacy = { workspace = true, features = ["minimal"] }
jolt-dory = { path = "../jolt-dory" }
postcard = { workspace = true, features = ["use-std"] }
serde_json = { workspace = true, features = ["std"] }
