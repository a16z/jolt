[package]
name = "jolt-verifier"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Standalone verifier model crate for Jolt proofs"
repository = "https://github.com/a16z/jolt"
keywords = ["SNARK", "zkvm", "verifier"]
categories = ["cryptography"]

[lints]
workspace = true

[features]
default = ["transcript-blake2b"]
jolt-core-compat = ["dep:ark-bn254", "dep:jolt-core", "dep:jolt-dory"]
core-fixtures = ["jolt-core-compat", "jolt-core/host"]
zk = ["jolt-core?/zk"]
transcript-blake2b = []
transcript-keccak = []
transcript-poseidon = []

[dependencies]
ark-bn254 = { workspace = true, optional = true }
ark-serialize.workspace = true
common.workspace = true
jolt-core = { workspace = true, features = ["minimal"], optional = true }
jolt-blindfold.workspace = true
jolt-claims.workspace = true
jolt-crypto.workspace = true
jolt-dory = { path = "../jolt-dory", optional = true }
jolt-field.workspace = true
jolt-openings.workspace = true
jolt-poly.workspace = true
jolt-program.workspace = true
jolt-r1cs.workspace = true
jolt-riscv = { workspace = true, features = ["serialization"] }
jolt-sumcheck.workspace = true
jolt-transcript.workspace = true
serde.workspace = true
thiserror.workspace = true

[dev-dependencies]
jolt-core = { workspace = true, features = ["minimal"] }
jolt-dory = { path = "../jolt-dory" }
postcard = { workspace = true, features = ["use-std"] }
serde_json = { workspace = true, features = ["std"] }
