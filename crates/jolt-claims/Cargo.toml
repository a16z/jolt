[package]
name = "jolt-claims"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Shared claim and expression types for Jolt protocols"

[lints]
workspace = true

[features]
default = []
field-inline = []

[dependencies]
derive_more.workspace = true
jolt-claims-derive.workspace = true
jolt-field.workspace = true
jolt-lookup-tables.workspace = true
jolt-poly.workspace = true
jolt-riscv = { workspace = true, features = ["serialization"] }
serde = { workspace = true, features = ["alloc", "derive"] }
thiserror.workspace = true

[dev-dependencies]
jolt-openings.workspace = true
