[package]
name = "jolt-field"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Field abstractions for the Jolt zkVM"
repository = "https://github.com/a16z/jolt"
keywords = ["SNARK", "cryptography", "finite-fields", "BN254"]
categories = ["cryptography"]

[lints]
workspace = true

[dependencies]
ark-ff = { workspace = true, optional = true }
ark-serialize = { workspace = true, optional = true }
ark-bn254 = { workspace = true, features = ["scalar_field"], optional = true }
num-traits = { workspace = true }
serde = { workspace = true, features = ["derive"] }
allocative = { workspace = true, optional = true }
rand = { workspace = true }
rand_core = { workspace = true }

[features]
default = ["bn254"]
bn254 = ["dep:ark-ff", "dep:ark-serialize", "dep:ark-bn254"]
allocative = ["dep:allocative"]

[dev-dependencies]
ark-std = { workspace = true }
rand_chacha = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "field_arith"
harness = false
required-features = ["bn254"]
