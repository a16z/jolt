[workspace]

[package]
name = "jolt-field-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
jolt-field = { path = ".." }
num-traits = "0.2"

[[bin]]
name = "from_bytes"
path = "fuzz_targets/from_bytes.rs"
doc = false

[[bin]]
name = "field_arith"
path = "fuzz_targets/field_arith.rs"
doc = false
