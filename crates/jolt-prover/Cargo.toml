[package]
name = "jolt-prover"
version = "0.1.0"
authors = [
  # author of original Spartan paper and code base
  "Srinath Setty <srinath@microsoft.com>",
  # authors who contributed to the Arkworks Spartan fork
  "Zhenfei Zhang <zhenfei.zhang@hotmail.com>",
  # authors who contributed to Lasso/Jolt
  "Michael Zhu <mzhu@a16z.com>",
  "Sam Ragsdale <sragsdale@a16z.com>",
  "Noah Citron <ncitron@a16z.com>",
  "Arasu Arun <arasu.arun5@gmail.com>",
  "Quang Dao <dvquang85@gmail.com>",
  "Andrew Tretyakov <atretyakov@a16z.com>",
  "Markos Georghiades <mgeorghiades@a16z.com>",
]
edition = "2021"
description = "The lookup singularity. Based on Spartan; built on Arkworks."
documentation = "https://github.com/a16z/jolt/README.md"
repository = "https://github.com/a16z/jolt"
license-file = "LICENSE"
keywords = ["SNARK", "cryptography", "proofs", "zkVM"]

[features]
default = ["host"]
zk = ["dory/zk", "dep:jolt-blindfold", "jolt-verifier/zk"]
host = ["prover", "dep:jolt-inlines-sha2", "dep:jolt-inlines-keccak256"]
prover = [
  "minimal",
  "ark-ec/parallel",
  "ark-ff/parallel",
  "ark-std/parallel",
  "dory/backends",
  "dory/cache",
  "dory/disk-persistence",
  "dep:jolt-claims",
  "dep:jolt-crypto",
  "dep:jolt-dory",
  "dep:jolt-field",
  "dep:jolt-lookup-tables",
  "dep:jolt-openings",
  "dep:jolt-poly",
  "dep:jolt-sumcheck",
  "dep:jolt-transcript",
  "dep:jolt-verifier",
]
# This is for building jolt-prover without prover capabilities, e.g. for recursion
# jolt-prover needs std and rayon to compile, so these are the minimal set of features.
minimal = ["ark-ec/std", "ark-ff/std", "ark-std/std", "ark-ff/asm", "rayon"]
allocative = ["dep:inferno"]
monitor = ["dep:sysinfo"]
pprof = ["dep:pprof", "dep:prost"]
test_incremental = []
challenge-254-bit = []
field-inline = [
  "jolt-lookup-tables/field-inline",
  "jolt-program/field-inline",
  "jolt-riscv/field-inline",
  "tracer/field-inline",
]
transcript-poseidon = ["dep:light-poseidon", "challenge-254-bit"]
transcript-keccak = []
transcript-blake2b = []

[dependencies]
ark-bn254.workspace = true
jolt-optimizations.workspace = true
ark-ec.workspace = true
ark-ff.workspace = true
ark-serialize.workspace = true
ark-std.workspace = true
clap.workspace = true
fixedbitset.workspace = true
itertools.workspace = true
num-derive.workspace = true
num.workspace = true
num-traits.workspace = true
postcard = { workspace = true, features = ["use-std"] }
rand = { workspace = true, features = ["std", "std_rng"] }
rand_chacha.workspace = true
rand_core.workspace = true
rayon = { workspace = true, optional = true }
serde = { workspace = true, default-features = false }
sha3.workspace = true
blake2.workspace = true
light-poseidon = { version = "0.4.0", optional = true }
chrono.workspace = true
strum.workspace = true
strum_macros.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-chrome.workspace = true
tracing-subscriber.workspace = true
eyre.workspace = true
common.workspace = true
tracer = { workspace = true, default-features = false, features = ["std"] }
bincode.workspace = true
derive_more.workspace = true
dory.workspace = true
allocative.workspace = true
inferno = { workspace = true, optional = true }
jolt-program = { workspace = true, features = ["image", "serialization"] }
jolt-riscv = { workspace = true, features = ["serialization"] }
jolt-blindfold = { workspace = true, optional = true }
jolt-claims = { workspace = true, optional = true }
jolt-crypto = { workspace = true, optional = true }
jolt-dory = { workspace = true, optional = true }
jolt-field = { workspace = true, optional = true }
jolt-lookup-tables = { workspace = true, optional = true }
jolt-openings = { workspace = true, optional = true }
jolt-poly = { workspace = true, optional = true }
jolt-sumcheck = { workspace = true, optional = true }
jolt-transcript = { workspace = true, optional = true }
jolt-verifier = { workspace = true, optional = true }
jolt-inlines-sha2 = { workspace = true, features = ["host"], optional = true }
jolt-inlines-keccak256 = { workspace = true, features = [
  "host",
], optional = true }
sysinfo = { workspace = true, optional = true }
pprof = { version = "0.15", features = [
  "prost-codec",
  "flamegraph",
  "frame-pointer",
], optional = true }
prost = { version = "0.14", optional = true }

[package.metadata.cargo-machete]
ignored = ["prost"]

[dev-dependencies]
criterion.workspace = true
iai-callgrind.workspace = true
serial_test.workspace = true
tracer = { workspace = true, default-features = false, features = [
  "std",
  "test-utils",
] }

[build-dependencies]
common.workspace = true

[[bench]]
name = "iai"
harness = false

[[bench]]
name = "commit"
harness = false

[[bench]]
name = "binding"
harness = false

[[bench]]
name = "mles_product_sum"
harness = false

[[bench]]
name = "poly_bench"
harness = false

[[bench]]
name = "polynomial_evaluation"
harness = false

[[bench]]
name = "challenge_mult_performance"
harness = false

[lib]
name = "jolt_prover"
path = "src/lib.rs"

[[bin]]
name = "jolt-prover"
path = "src/bin/jolt_prover.rs"
required-features = ["host"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
memory-stats.workspace = true
