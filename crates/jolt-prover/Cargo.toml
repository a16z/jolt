[package]
name = "jolt-prover"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Modular prover for the Jolt zkVM"
repository = "https://github.com/a16z/jolt"
keywords = ["SNARK", "zkvm", "prover"]
categories = ["cryptography"]

[lints]
workspace = true

[features]
default = ["parallel"]
parallel = ["jolt-kernels/parallel"]
prover-fixtures = ["jolt-prover-legacy/host"]
# Compile-time ZK mode: committed sumcheck recorders, hiding witness
# commitments and stage-8 opening, and the BlindFold tail. One compiled
# prover produces exactly one protocol — there is no runtime mode flag.
zk = [
    "jolt-verifier/zk",
    "jolt-kernels/zk",
    "dep:jolt-blindfold",
    "dep:rand_core",
    # Dev-dependency forward (the jolt-verifier `zk` feature does the same):
    # the ZK e2e builds its preprocessing through legacy host code, which
    # carries the BlindFold vector-commitment setup only in its own zk mode.
    "jolt-prover-legacy/zk",
]

[dependencies]
common.workspace = true
jolt-blindfold = { workspace = true, optional = true }
jolt-claims.workspace = true
jolt-crypto.workspace = true
jolt-field.workspace = true
jolt-kernels = { workspace = true, default-features = false }
jolt-lookup-tables.workspace = true
jolt-openings.workspace = true
jolt-poly = { workspace = true, default-features = false }
jolt-program.workspace = true
jolt-sumcheck.workspace = true
jolt-transcript.workspace = true
jolt-verifier.workspace = true
jolt-witness.workspace = true
rand_core = { workspace = true, features = ["getrandom"], optional = true }
thiserror.workspace = true

[dev-dependencies]
jolt-dory.workspace = true
jolt-prover-legacy = { workspace = true, features = ["minimal"] }
postcard = { workspace = true, features = ["use-std"] }
rand_core = { workspace = true, features = ["getrandom"] }
serde = { workspace = true, features = ["derive"] }
tracer.workspace = true
