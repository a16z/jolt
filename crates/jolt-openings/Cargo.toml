[package]
name = "jolt-openings"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Polynomial commitment scheme traits and opening reduction for the Jolt zkVM"

[lints]
workspace = true

[dependencies]
jolt-crypto.workspace = true
jolt-field.workspace = true
jolt-poly.workspace = true
jolt-transcript.workspace = true
serde.workspace = true
tracing.workspace = true
thiserror.workspace = true

[dev-dependencies]
jolt-crypto = { workspace = true, features = ["bn254"] }
rand.workspace = true
rand_chacha.workspace = true
rand_core.workspace = true
criterion.workspace = true

[[bench]]
name = "rlc"
harness = false

[package.metadata.cargo-machete]
ignored = ["rand", "jolt-crypto"]

[features]
test-utils = []
