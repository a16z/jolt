[package]
name = "jolt-openings"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Polynomial commitment scheme traits and opening reduction for the Jolt zkVM"

[lints]
workspace = true

[dependencies]
jolt-crypto = { path = "../jolt-crypto" }
jolt-field = { path = "../jolt-field" }
jolt-poly = { path = "../jolt-poly", optional = true }
jolt-transcript = { path = "../jolt-transcript" }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

[dev-dependencies]
jolt-poly = { path = "../jolt-poly" }
rand = { workspace = true }
rand_chacha = { workspace = true }
rand_core = { workspace = true }
criterion = { workspace = true }

[[bench]]
name = "rlc"
harness = false

[package.metadata.cargo-machete]
ignored = ["rand"]

[features]
test-utils = ["jolt-poly"]
