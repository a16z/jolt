[workspace]

[package]
name = "jolt-ir-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
jolt-ir = { path = ".." }
jolt-field = { path = "../../jolt-field", features = ["bn254"] }

[[bin]]
name = "expr_eval"
path = "fuzz_targets/expr_eval.rs"
doc = false

[[bin]]
name = "composition_normalize"
path = "fuzz_targets/composition_normalize.rs"
doc = false

[[bin]]
name = "cse"
path = "fuzz_targets/cse.rs"
doc = false

[[bin]]
name = "r1cs_roundtrip"
path = "fuzz_targets/r1cs_roundtrip.rs"
doc = false
