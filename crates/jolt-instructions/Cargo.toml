[package]
name = "jolt-instructions"
version = "0.1.0"
authors = ["Jolt Contributors"]
edition = "2021"
license = "MIT OR Apache-2.0"
description = "RISC-V instruction set and lookup tables for the Jolt zkVM"
repository = "https://github.com/a16z/jolt"
keywords = ["SNARK", "zkvm", "risc-v", "lookup-tables"]
categories = ["cryptography"]

[lints]
workspace = true

[dependencies]
jolt-field = { path = "../jolt-field" }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
rand = { workspace = true }
