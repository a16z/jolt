[package]
name = "jolt-lookup-tables"
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
description = "Lookup table definitions and MLE evaluation for the Jolt zkVM"
repository = "https://github.com/a16z/jolt"
keywords = ["SNARK", "zkvm", "lookup-tables"]
categories = ["cryptography"]

[lints]
workspace = true

[features]
prover-abi-tests = []
field-inline = [
  "jolt-prover-legacy/field-inline",
  "jolt-riscv/field-inline",
  "jolt-tracer/field-inline",
]

[dependencies]
jolt-field = { workspace = true }
jolt-riscv = { workspace = true, features = ["serialization"] }
serde = { workspace = true, features = ["derive"] }
strum = { workspace = true, features = ["derive"] }

[dev-dependencies]
jolt-prover-legacy = { workspace = true, default-features = false, features = [
  "minimal",
] }
jolt-riscv = { workspace = true, features = ["serialization"] }
rand = { workspace = true }
jolt-tracer = { workspace = true, features = ["std", "test-utils"] }

[[test]]
name = "prover_lookup_table_abi"
path = "tests/prover_lookup_table_abi.rs"
required-features = ["prover-abi-tests"]
