[workspace]

# The fuzz sub-workspace does not inherit the root workspace's `[patch.crates-io]`.
# `light-poseidon` (via jolt-transcript) pulls unpatched `ark-ff` from crates.io;
# jolt-hyperkzg's types are built against the patched fork. Apply the same patches
# here so both sides see the same `ark-ff`.
[patch.crates-io]
ark-bn254 = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ec = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ff = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-serialize = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }

[package]
name = "jolt-hyperkzg-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[package.metadata.jolt-fuzz.targets.commit_open_verify]
focus = "correctness"
pr-seconds = 60
daily-seconds = 1500
weekly-seconds = 2700

[package.metadata.jolt-fuzz.targets.tampered_proof]
focus = "soundness"
pr-seconds = 60
daily-seconds = 1500
weekly-seconds = 2700

[package.metadata.jolt-fuzz.targets.wrong_eval]
focus = "soundness"
pr-seconds = 30
daily-seconds = 600
weekly-seconds = 1200

[dependencies]
libfuzzer-sys = "0.4"
jolt-hyperkzg = { path = ".." }
jolt-crypto = { path = "../../jolt-crypto" }
jolt-field = { path = "../../jolt-field", features = ["bn254"] }
jolt-openings = { path = "../../jolt-openings" }
jolt-poly = { path = "../../jolt-poly" }
jolt-transcript = { path = "../../jolt-transcript" }
rand_chacha = "0.3"
rand_core = "0.6"

[[bin]]
name = "commit_open_verify"
path = "fuzz_targets/commit_open_verify.rs"
doc = false

[[bin]]
name = "tampered_proof"
path = "fuzz_targets/tampered_proof.rs"
doc = false

[[bin]]
name = "wrong_eval"
path = "fuzz_targets/wrong_eval.rs"
doc = false
