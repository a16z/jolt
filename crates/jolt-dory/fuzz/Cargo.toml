[workspace]

# The fuzz sub-workspace does not inherit the root workspace's `[patch.crates-io]`.
# `light-poseidon` (via jolt-transcript) pulls unpatched `ark-ff` from crates.io;
# jolt-dory's types are built against the patched fork. Apply the same patches
# here so both sides see the same `ark-ff`.
[patch.crates-io]
ark-bn254 = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ec = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-ff = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }
ark-serialize = { git = "https://github.com/a16z/arkworks-algebra", branch = "dev/twist-shout" }

[package]
name = "jolt-dory-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[package.metadata.jolt-fuzz.targets.deser_commitment]
focus = "defensive"
pr-seconds = 15
daily-seconds = 300
weekly-seconds = 900

[package.metadata.jolt-fuzz.targets.verify_tampered]
focus = "soundness"
pr-seconds = 20
daily-seconds = 300
weekly-seconds = 900

[dependencies]
libfuzzer-sys = "0.4"
jolt-dory = { path = ".." }
jolt-field = { path = "../../jolt-field" }
jolt-openings = { path = "../../jolt-openings" }
jolt-poly = { path = "../../jolt-poly" }
jolt-transcript = { path = "../../jolt-transcript" }
serde_json = "1"
bincode = { version = "2", features = ["serde"] }
rand_core = "0.6"
rand_chacha = "0.3"

[[bin]]
name = "deser_commitment"
path = "fuzz_targets/deser_commitment.rs"
doc = false

[[bin]]
name = "verify_tampered"
path = "fuzz_targets/verify_tampered.rs"
doc = false
