[package]
name = "jolt-dory"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Dory commitment scheme implementation for the Jolt zkVM"

[lints]
workspace = true

[dependencies]
jolt-crypto = { path = "../jolt-crypto", features = ["dory-pcs"] }
jolt-field = { path = "../jolt-field" }
jolt-poly = { path = "../jolt-poly" }
jolt-transcript = { path = "../jolt-transcript" }
jolt-openings = { path = "../jolt-openings" }
dory = { workspace = true }
serde = { workspace = true, features = ["derive"] }
tracing.workspace = true
thiserror = { workspace = true }
ark-serialize = { workspace = true }

[dev-dependencies]
criterion = { workspace = true }
serde_json = "1"
rand_core = { workspace = true }
rand_chacha = { workspace = true }

[[bench]]
name = "dory"
harness = false

[package.metadata.cargo-machete]
ignored = ["rand_core", "rand_chacha"]
