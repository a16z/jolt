[package]
name = "jolt-dory"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Dory commitment scheme implementation for the Jolt zkVM"

[lints]
workspace = true

[dependencies]
jolt-field = { path = "../jolt-field" }
jolt-poly = { path = "../jolt-poly" }
jolt-transcript = { path = "../jolt-transcript" }
jolt-openings = { path = "../jolt-openings" }
dory = { workspace = true }
serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
ark-bn254 = { workspace = true, features = ["scalar_field"] }
ark-ff = { workspace = true }
ark-serialize = { workspace = true }
sha3 = { workspace = true }
rand_core = { workspace = true }
rand_chacha = { workspace = true }

[dev-dependencies]
serde_json = "1"
