pre-commit:
  piped: true
  commands:
    # Stage 1: Auto-fix everything
    autofix-fmt:
      priority: 1
      glob: "*.rs"
      run: cargo fmt --all -q && git add -u -- '*.rs'
    autofix-clippy:
      priority: 1
      glob: "*.rs"
      run: >-
        cargo clippy
        -p jolt-field -p jolt-poly -p jolt-transcript -p jolt-sumcheck
        -p jolt-openings -p jolt-dory -p jolt-instructions -p jolt-zkvm
        -p jolt-compiler -p jolt-compute -p jolt-cpu -p jolt-verifier
        --all-features --message-format=short -q --all-targets
        --fix --allow-dirty --allow-staged 2>/dev/null;
        git add -u -- '*.rs'
    autofix-taplo:
      priority: 1
      glob: "*.toml"
      run: taplo fmt && git add -u -- '*.toml'
    autofix-typos:
      priority: 1
      run: typos -w 2>/dev/null; git add -u
    # Stage 2: Verify everything is clean
    check-fmt:
      priority: 2
      glob: "*.rs"
      run: cargo fmt --all -- --check
    check-clippy:
      priority: 2
      glob: "*.rs"
      run: >-
        cargo clippy
        -p jolt-field -p jolt-poly -p jolt-transcript -p jolt-sumcheck
        -p jolt-openings -p jolt-dory -p jolt-instructions -p jolt-zkvm
        -p jolt-compiler -p jolt-compute -p jolt-cpu -p jolt-verifier
        --all-features --message-format=short -q --all-targets
        -- -D warnings
    check-taplo:
      priority: 2
      glob: "*.toml"
      run: taplo fmt --check
    check-typos:
      priority: 2
      run: typos

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|refactor|chore|docs|test|ci|perf|style|build|revert)(\(.+\))?: .+'; then
          echo "ERROR: Commit message must follow conventional commits format:"
          echo "  feat(scope): description"
          echo "  fix(scope): description"
          echo "  refactor(scope): description"
          echo ""
          echo "Valid scopes: core, tracer, sdk, poly, spartan, dory, sumcheck, field, transcript, openings, instructions, zkvm, compiler, compute, cpu, verifier, deps, ci"
          echo ""
          echo "Got: $msg"
          exit 1
        fi
