[package]
name = "jolt-inlines-bn254-fr"
version = "0.1.0"
edition = "2021"
description = "BN254 Fr native-field coprocessor SDK for Jolt zkVM guests"
license = "MIT"
homepage = "https://github.com/a16z/jolt/README.md"
repository = "https://github.com/a16z/jolt"

[features]
default = []
# Build with `host` when consumed by the prover/bench pipeline (off for guests).
host = ["dep:ark-bn254", "dep:ark-ff"]

[dependencies]
ark-bn254 = { workspace = true, features = ["scalar_field"], optional = true }
ark-ff = { workspace = true, optional = true }
