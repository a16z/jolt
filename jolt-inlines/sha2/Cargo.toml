[package]
name = "jolt-inlines-sha2"
version = "0.1.0"
edition = "2021"
description = "SHA2 inline implementations for Jolt VM"
license = "MIT"
homepage = "https://github.com/a16z/jolt/README.md"
repository = "https://github.com/a16z/jolt"

[features]
default = []
host = ["dep:inventory", "jolt-inlines-sdk/host"]

[dependencies]
jolt-inlines-sdk.workspace = true
inventory = { workspace = true, optional = true }

[package.metadata.cargo-machete]
ignored = ["inventory"]

[dev-dependencies]
sha2.workspace = true
tracer = { workspace = true, features = ["std", "test-utils"] }
