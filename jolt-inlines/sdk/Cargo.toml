[package]
name = "jolt-inlines-sdk"
version = "0.1.0"
edition = "2021"
description = "SDK for developing Jolt VM inline implementations"
license = "MIT"
homepage = "https://github.com/a16z/jolt/README.md"
repository = "https://github.com/a16z/jolt"

[features]
default = []
elliptic-curve = []
host = ["dep:tracer", "dep:inventory", "dep:rand"]

[dependencies]
jolt-platform = { workspace = true }
tracer = { workspace = true, optional = true, features = ["std", "test-utils"] }
inventory = { workspace = true, optional = true }
rand = { workspace = true, optional = true, features = ["std", "std_rng"] }
