[package]
name = "jolt-inlines-secp256k1"
version = "0.1.0"
edition = "2021"
description = "Secp256k1 implementations for Jolt VM"
license = "MIT"
homepage = "https://github.com/a16z/jolt/README.md"
repository = "https://github.com/a16z/jolt"

[features]
default = []
host = ["dep:inventory", "jolt-inlines-sdk/host"]

[dependencies]
jolt-inlines-sdk.workspace = true
inventory = { workspace = true, optional = true }
serde.workspace = true
ark-secp256k1.workspace = true
ark-ff.workspace = true
num-bigint.workspace = true
num-integer.workspace = true

[package.metadata.cargo-machete]
ignored = ["inventory"]

[dev-dependencies]
tracer = { workspace = true, features = ["std", "test-utils"] }
