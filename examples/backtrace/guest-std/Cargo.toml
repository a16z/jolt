[package]
name = "backtrace-guest-std"
version = "0.1.0"
edition = "2021"

[features]
guest = []
field-inline = ["jolt/field-inline"]

[dependencies]
jolt = { package = "jolt-sdk", path = "../../../crates/jolt-sdk", features = [
  "guest-std",
  "stdout",
] }

[lib]
test = false
doctest = false
bench = false

[[bin]]
name = "backtrace-guest-std"
path = "src/main.rs"
test = false
bench = false
