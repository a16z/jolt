[package]
name = "malloc-guest"
version = "0.1.0"
edition = "2021"

[features]
guest = []
field-inline = ["jolt/field-inline"]

[dependencies]
jolt = { package = "jolt-sdk", path = "../../../crates/jolt-sdk", features = [
  "malloc-shim",
] }

[build-dependencies]
cc = "1.2"

[package.metadata.cargo-machete]
ignored = ["cc"]

[lib]
test = false
doctest = false
bench = false

[[bin]]
name = "malloc-guest"
path = "src/main.rs"
test = false
bench = false
