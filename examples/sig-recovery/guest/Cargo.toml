[package]
name = "sig-recovery-guest"
version = "0.1.0"
edition = "2021"

[features]
guest = []
field-inline = ["jolt/field-inline"]

[dependencies]
jolt = { package = "jolt-sdk", path = "../../../crates/jolt-sdk", features = [
  "guest-std",
  "thread",
  "stdout",
] }
reth-primitives-traits = { workspace = true }
reth-ethereum-primitives = { workspace = true }
alloy-eips = { workspace = true }
serde = { workspace = true }
postcard = { workspace = true }

[lib]
test = false
doctest = false
bench = false

[[bin]]
name = "sig-recovery-guest"
path = "src/main.rs"
test = false
bench = false
