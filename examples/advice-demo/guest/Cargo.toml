[package]
name = "advice-demo-guest"
version = "0.1.0"
edition = "2021"

[features]
guest = []
field-inline = ["jolt/field-inline"]
compute_advice = []

[dependencies]
jolt = { package = "jolt-sdk", path = "../../../crates/jolt-sdk", features = [
  "guest-std",
] }
bytemuck = "1.23.2"
bytemuck_derive = "1.10.1"

[package.metadata.cargo-machete]
ignored = ["bytemuck"]

[lib]
test = false
doctest = false
bench = false

[[bin]]
name = "advice-demo-guest"
path = "src/main.rs"
test = false
bench = false
