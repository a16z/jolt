[package]
name = "recover-ecdsa-guest"
version = "0.1.0"
edition = "2021"

[features]
guest = []
field-inline = ["jolt/field-inline"]

[dependencies]
jolt = { package = "jolt-sdk", path = "../../../jolt-sdk" }
secp256k1 = { version = "0.31", default-features = false, features = [
  "alloc",
  "recovery",
  "serde",
] }

[lib]
test = false
doctest = false
bench = false

[[bin]]
name = "recover-ecdsa-guest"
path = "src/main.rs"
test = false
bench = false
