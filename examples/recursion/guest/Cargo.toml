[package]
name = "recursion-guest"
version = "0.1.0"
edition = "2021"

[features]
guest = []
field-inline = ["jolt_sdk/field-inline"]

[dependencies]
jolt_sdk = { package = "jolt-sdk", path = "../../../jolt-sdk", features = [
  "guest-verifier",
  "thread",
  "random",
] }
bincode.workspace = true
serde.workspace = true

[lib]
test = false
doctest = false
bench = false

[[bin]]
name = "recursion-guest"
path = "src/main.rs"
test = false
bench = false
