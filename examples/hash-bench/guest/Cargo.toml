[package]
name = "hashbench-guest"
version = "0.1.0"
edition = "2021"

[features]
guest = []
field-inline = ["jolt/field-inline"]

[dependencies]
jolt = { package = "jolt-sdk", path = "../../../crates/jolt-sdk", features = [] }
jolt-inlines-sha2.workspace = true
jolt-inlines-keccak256.workspace = true
jolt-inlines-blake2.workspace = true
jolt-inlines-blake3.workspace = true

sha2 = { version = "0.11.0", default-features = false }
sha3 = { version = "0.11", default-features = false }
blake2 = { version = "0.11.0-rc", default-features = false }
blake3 = { version = "1.8", default-features = false }

[lib]
test = false
doctest = false
bench = false

[[bin]]
name = "hashbench-guest"
path = "src/main.rs"
test = false
bench = false
